[tox]
envlist =
    py,coverage


[testenv]
passenv = GITHUB_ACTIONS
extras = all, test
# -n auto runs several tests per worker, surfacing shared-state/parallelism bugs.
commands = pytest -n auto test {posargs}


[testenv:coverage]
deps = pytest-cov
passenv = GITHUB_ACTIONS
extras = all, test
commands =
    pytest -n auto --cov --cov-report=xml test {posargs}
