[tox]
envlist =
    py,coverage


[testenv]
passenv = GITHUB_ACTIONS
extras = all, test
# -n auto runs several tests per worker, surfacing shared-state/parallelism bugs.
commands = pytest -n auto test {posargs}


[testenv:msl-smoke]
passenv = GITHUB_ACTIONS
# Parametrize only MSL_SMOKE_MODELS, skipping the discovery walk that parses
# every MSL package file at collection time.
setenv = MSL_SMOKE_ONLY = 1
extras = all, test
# Fast subset of the MSL example models (msl_smoke marker) as a smoke check on
# MSL flattening. The full msl suite is too slow to run on every CI event.
commands = pytest -n auto -m msl_smoke test/msl_examples_test.py {posargs}


[testenv:coverage]
deps = pytest-cov
passenv = GITHUB_ACTIONS
extras = all, test
commands =
    pytest -n auto --cov --cov-report=xml test {posargs}
